name: Nightly hardening

# Phase 3.2 / 3.4 skeletons + optional slow Tauri smoke (commented).
# PR-gate Playwright lives in ci.yml (desktop-e2e). This workflow is the
# slower / credential-gated layer and must not block merges.

on:
  schedule:
    # 05:17 UTC daily
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      soak_turns:
        description: "soak turn count (unused until Tauri soak lands)"
        required: false
        default: "5"

concurrency:
  group: nightly-hardening
  cancel-in-progress: true

jobs:
  # ── 3.2 soak placeholder (mock IPC removed; skip until Tauri soak) ───────
  soak-browser-mock:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/desktop
    env:
      CI: true
      SOAK_TURNS: ${{ github.event.inputs.soak_turns || '5' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run soak placeholder
        run: SOAK_OUT=.soak/ci-summary.json pnpm soak
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-summary
          path: packages/desktop/.soak/
          if-no-files-found: ignore

  # ── 3.4 provider matrix (env-gated; soft-pass with no keys) ───────────────
  provider-matrix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    # Repository secrets (optional). Missing keys → skip that provider.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sdk
            packages/providers
            packages/search
            packages/engine
      - name: Build flex binary
        run: cargo build -p agentloop-sdk --release --all-features
      - name: Provider matrix smoke
        run: |
          chmod +x scripts/provider-matrix-smoke.sh
          FLEX_BIN="$PWD/target/release/flex" ./scripts/provider-matrix-smoke.sh

  # ── 3.1 slow layer: real-window osascript smoke (DISABLED) ────────────────
  # Uncomment when a signed/unsigned .app artifact is available on the runner
  # and an Apple Silicon macOS job can launch the bundle headlessly enough for
  # Accessibility scripting. Keep this off the PR gate forever.
