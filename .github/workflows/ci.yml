name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── engine ────────────────────────────────────────────────────────────────
  engine-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Docs build (rustdoc warnings are errors)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Schema drift gate
        run: cargo xtask schema --check
      - name: Brand-leak gate
        working-directory: .
        run: |
          ! git grep -iIl 'flex' -- packages/engine/crates/ \
              ':!packages/engine/crates/contracts/src/branding.rs'

  engine-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine
      - run: cargo test --workspace --all-features

  engine-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/engine/Cargo.toml

  # ── providers ───────────────────────────────────────────────────────────────
  providers-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/providers
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/providers
            packages/engine
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Brand-leak gate (crate names and code stay brand-free)
        working-directory: .
        run: |
          ! git grep -iIl 'flex' -- packages/providers/crates/

  providers-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/providers
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/providers
            packages/engine
      - run: cargo test --workspace --all-features

  providers-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/providers/Cargo.toml

  # ── search ────────────────────────────────────────────────────────────────
  search-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/search
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/search
            packages/engine
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Brand-leak gate (crate names and code stay brand-free)
        working-directory: .
        run: |
          ! git grep -iIl 'flex' -- packages/search/crates/

  search-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/search
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/search
            packages/engine
      - run: cargo test --workspace --all-features

  search-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/search/Cargo.toml

  # ── index ─────────────────────────────────────────────────────────────────
  index-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/index
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/index
            packages/engine
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Brand-leak gate (crate names and code stay brand-free)
        working-directory: .
        run: |
          ! git grep -iIl 'flex' -- packages/index/crates/

  index-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/index
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/index
            packages/engine
      - run: cargo test --workspace --all-features
      - name: Retrieval eval gate (recall@10 ≥ 0.8)
        run: cargo test -p agentloop-index --test retrieval_eval_gate -- --nocapture

  index-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/index/Cargo.toml

  # ── sdk ───────────────────────────────────────────────────────────────────
  sdk-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sdk
            packages/providers
            packages/search
            packages/engine
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Brand-leak gate (only the flex bin crate carries the brand)
        working-directory: .
        run: |
          ! git grep -iIl 'flex' -- packages/sdk/crates/ \
              ':!packages/sdk/crates/sdk/Cargo.toml'

  sdk-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sdk
            packages/providers
            packages/search
            packages/engine
      - run: cargo test --workspace --all-features
      - name: The shippable binary always links
        run: cargo build -p agentloop-sdk --all-features

  sdk-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/sdk/Cargo.toml

  # ── desktop (frontend) ──────────────────────────────────────────────────────
  desktop-frontend:
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test

  # Phase 3.1 fast layer: Playwright asserts Vite shows native-app-required
  # (no mock IPC). Nightly soak / provider matrix live in nightly.yml.
  desktop-e2e:
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  # ── desktop (src-tauri, macOS arm64) ───────────────────────────────────────
  # macos-14 = Apple Silicon. Bundling (.dmg) lives in release.yml on tag push;
  # this job only gates fmt/clippy/test so PRs stay fast.
  desktop-tauri-lint:
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri
            packages/engine
            packages/providers
            packages/search
            packages/index
            packages/sdk
            packages/gateway
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  desktop-tauri-test:
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri
            packages/engine
            packages/providers
            packages/search
            packages/index
            packages/sdk
            packages/gateway
      - run: cargo test --workspace --all-features
