[workspace]
resolver = "3"
members = ["crates/core", "crates/cli"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/agenticstudio/agenticstudio"
publish = false

[workspace.dependencies]
# internal
agentloop-cli-core = { path = "crates/core" }
# engine (path deps into the sibling workspace)
agentloop-contracts = { path = "../engine/crates/contracts" }
agentloop-core = { path = "../engine/crates/core" }
agentloop-engine = { path = "../engine/crates/engine" }
agentloop-session = { path = "../engine/crates/session" }
agentloop-delegator-claude-code = { path = "../engine/crates/delegators/claude-code" }
agentloop-delegator-copilot = { path = "../engine/crates/delegators/copilot" }
agentloop-provider-copilot = { path = "../engine/crates/providers/copilot" }
agentloop-provider-openai = { path = "../engine/crates/providers/openai" }
agentloop-loop = { path = "../engine/crates/loop" }
agentloop-tools = { path = "../engine/crates/tools" }
agentloop-testkit = { path = "../engine/crates/testkit" }
# TUI stack — ratatui 0.29 line, pinned by tui-textarea (requires ratatui ^0.29)
ratatui = { version = "0.29", features = ["unstable-rendered-line-info"] }
crossterm = { version = "0.28", features = ["event-stream"] }
tui-textarea = "0.7"
tui-markdown = "0.3.6"
pulldown-cmark = "0.13"
unicode-width = "0.2"
similar = "2"
# async — mirror the engine workspace pins
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "io-util", "fs", "process", "signal"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
futures = "0.3"
async-trait = "0.1"
# errors / logging / serde
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# dev
insta = { version = "1", features = ["json", "redactions"] }
pretty_assertions = "1"
tempfile = "3"
temp_env = { package = "temp-env", version = "0.3" }
ignore = "0.4"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
