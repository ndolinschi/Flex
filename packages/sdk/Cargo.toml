[workspace]
resolver = "3"
members = ["crates/sdk"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
publish = false

[workspace.dependencies]
# engine (path deps into the sibling engine workspace)
agentloop-contracts = { path = "../engine/crates/contracts" }
agentloop-core = { path = "../engine/crates/core" }
agentloop-engine = { path = "../engine/crates/engine" }
agentloop-session = { path = "../engine/crates/session" }
agentloop-transport-stdio = { path = "../engine/crates/transports/stdio" }

# providers facade + search plugin (sibling workspaces)
agentloop-providers = { path = "../providers/crates/providers" }
agentloop-search = { path = "../search/crates/search" }

# external
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "io-util", "io-std", "fs", "process", "signal"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
