[workspace]
resolver = "3"
members = ["crates/channel"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ndolinschi/Flex"
publish = true

[workspace.dependencies]
# Engine path deps
agentloop-contracts = { path = "../engine/crates/contracts", version = "0.1.0" }
agentloop-core = { path = "../engine/crates/core", version = "0.1.0" }
agentloop-engine = { path = "../engine/crates/engine", version = "0.1.0" }
# Local members
agentloop-channel = { path = "crates/channel", version = "0.1.0" }
# External
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
async-trait = "0.1"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "signal"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "charset", "gzip"] }
anyhow = "1"
# Dev
wiremock = "0.6"
tempfile = "3"
pretty_assertions = "1"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
