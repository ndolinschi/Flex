[workspace]
resolver = "3"
members = [
    "crates/providers",
    "crates/anthropic",
    "crates/bedrock",
    "crates/common",
    "crates/copilot",
    "crates/gemini",
    "crates/ollama",
    "crates/openai",
    "crates/delegators/acp",
    "crates/delegators/claude-code",
    "crates/delegators/common",
    "crates/delegators/copilot",
    "crates/delegators/cursor",
    "crates/delegators/opencode",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/flex/flex"
publish = false

[workspace.dependencies]
# facade
agentloop-providers = { path = "crates/providers" }
# provider clients
agentloop-provider-anthropic = { path = "crates/anthropic" }
agentloop-provider-bedrock = { path = "crates/bedrock" }
agentloop-provider-common = { path = "crates/common" }
agentloop-provider-copilot = { path = "crates/copilot" }
agentloop-provider-gemini = { path = "crates/gemini" }
agentloop-provider-ollama = { path = "crates/ollama" }
agentloop-provider-openai = { path = "crates/openai" }
# external-agent connectors (delegators)
agentloop-delegator-acp = { path = "crates/delegators/acp" }
agentloop-delegator-claude-code = { path = "crates/delegators/claude-code" }
agentloop-delegator-common = { path = "crates/delegators/common" }
agentloop-delegator-copilot = { path = "crates/delegators/copilot" }
agentloop-delegator-cursor = { path = "crates/delegators/cursor" }
agentloop-delegator-opencode = { path = "crates/delegators/opencode" }
# engine (path deps into the sibling engine workspace)
agentloop-contracts = { path = "../engine/crates/contracts" }
agentloop-core = { path = "../engine/crates/core" }
agentloop-engine = { path = "../engine/crates/engine" }
agentloop-loop = { path = "../engine/crates/loop" }
agentloop-session = { path = "../engine/crates/session" }
agentloop-tools = { path = "../engine/crates/tools" }
agentloop-prompts = { path = "../engine/crates/prompts" }
agentloop-workspace = { path = "../engine/crates/workspace" }
agentloop-mcp = { path = "../engine/crates/mcp" }
# external
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
thiserror = "2"
uuid = { version = "1", features = ["v7", "serde"] }
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "io-util", "io-std", "fs", "process", "signal"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = "0.24"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls", "charset", "gzip"] }
globset = "0.4"
ignore = "0.4"
regex = "1"
htmd = "0.2"
base64 = "0.22"
sha2 = "0.10"
getrandom = "0.2"
http = "1"
# dev
insta = { version = "1", features = ["json", "redactions"] }
pretty_assertions = "1"
tempfile = "3"
temp_env = { package = "temp-env", version = "0.3" }
wiremock = "0.6"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
