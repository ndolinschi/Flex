<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- First paint before Vite CSS/JS: match dark --color-chrome so the
         window never flashes the WebView default white on cold start. -->
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: #141414;
        color: rgba(250, 250, 250, 0.58);
      }
      #boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        font: 400 13px / 1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Agent</title>
  </head>

  <body>
    <div id="root">
      <div id="boot-splash" role="status" aria-live="polite">Loading…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
