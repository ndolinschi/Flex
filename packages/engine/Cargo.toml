[workspace]
resolver = "3"
members = [
    "crates/contracts",
    "crates/core",
    "crates/delegators/acp",
    "crates/delegators/claude-code",
    "crates/delegators/common",
    "crates/delegators/copilot",
    "crates/delegators/cursor",
    "crates/delegators/opencode",
    "crates/engine",
    "crates/loop",
    "crates/mcp",
    "crates/providers/anthropic",
    "crates/providers/common",
    "crates/providers/copilot",
    "crates/providers/gemini",
    "crates/providers/ollama",
    "crates/providers/openai",
    "crates/prompts",
    "crates/session",
    "crates/tools",
    "crates/workspace",
    "crates/transports/stdio",
    "crates/testkit",
    "crates/runner",
    "xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/flex/flex"
publish = false

[workspace.dependencies]
# internal
agentloop-contracts = { path = "crates/contracts" }
agentloop-core = { path = "crates/core" }
agentloop-delegator-acp = { path = "crates/delegators/acp" }
agentloop-delegator-claude-code = { path = "crates/delegators/claude-code" }
agentloop-delegator-copilot = { path = "crates/delegators/copilot" }
agentloop-delegator-common = { path = "crates/delegators/common" }
agentloop-delegator-cursor = { path = "crates/delegators/cursor" }
agentloop-delegator-opencode = { path = "crates/delegators/opencode" }
agentloop-engine = { path = "crates/engine" }
agentloop-loop = { path = "crates/loop" }
agentloop-mcp = { path = "crates/mcp" }
agentloop-provider-anthropic = { path = "crates/providers/anthropic" }
agentloop-provider-common = { path = "crates/providers/common" }
agentloop-provider-copilot = { path = "crates/providers/copilot" }
agentloop-provider-gemini = { path = "crates/providers/gemini" }
agentloop-provider-ollama = { path = "crates/providers/ollama" }
agentloop-provider-openai = { path = "crates/providers/openai" }
agentloop-prompts = { path = "crates/prompts" }
agentloop-session = { path = "crates/session" }
agentloop-tools = { path = "crates/tools" }
agentloop-workspace = { path = "crates/workspace" }
agentloop-transport-stdio = { path = "crates/transports/stdio" }
agentloop-testkit = { path = "crates/testkit" }
# external
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
thiserror = "2"
uuid = { version = "1", features = ["v7", "serde"] }
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "io-util", "io-std", "fs", "process", "signal"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = "0.24"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls", "charset", "gzip"] }
globset = "0.4"
ignore = "0.4"
regex = "1"
htmd = "0.2"
base64 = "0.22"
# dev
insta = { version = "1", features = ["json", "redactions"] }
pretty_assertions = "1"
tempfile = "3"
wiremock = "0.6"
rmcp = { version = "2.1.0", default-features = false, features = [
    "client",
    "transport-child-process",
    "transport-streamable-http-client-reqwest",
] }
http = "1"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
