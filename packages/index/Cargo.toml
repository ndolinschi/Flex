[workspace]
resolver = "3"
members = ["crates/index"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ndolinschi/Flex"
publish = true

[workspace.dependencies]
# Engine path deps
agentloop-contracts = { path = "../engine/crates/contracts", version = "0.1.0" }
agentloop-core = { path = "../engine/crates/core", version = "0.1.0" }
agentloop-engine = { path = "../engine/crates/engine", version = "0.1.0" }
agentloop-tools = { path = "../engine/crates/tools", version = "0.1.0" }
# External
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
thiserror = "2"
async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "process"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
ignore = "0.4"
blake3 = "1"
tantivy = "0.26"
tree-sitter = "0.26"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
tree-sitter-go = "0.25"
bincode = { version = "2", features = ["serde"] }
# Blocking HTTP for the opt-in remote EmbeddingProvider
# (`AGENTLOOP_EMBEDDINGS=remote`). Kept out of the local-embeddings path.
ureq = { version = "2", default-features = false, features = ["json", "tls"] }
# Local embeddings (bge-small-en-v1.5, 384d), opt-in behind the crate's
# `local-embeddings` feature — never in default features, never downloaded
# or exercised by tests/CI. Default features disabled: they pull in
# `ort-download-binaries-native-tls` + `hf-hub-native-tls` (bundled ONNX
# runtime binaries + an HTTP client), which we still want for the actual
# opt-in download path, so they're re-added explicitly at the member level.
fastembed = { version = "5", default-features = false }

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
